# Nginx config for NexaPay on Azure VPS
# Uses current Docker-published ports:
# - Portal (Next.js): 127.0.0.1:3001
# - Backend (Rust API): 127.0.0.1:8088
#
# IMPORTANT:
# Frontend backend base URL must be set to:
#   NEXT_PUBLIC_API_URL=https://nexapay.space/backend
# so this path maps to the Rust API without clashing with Next.js /api routes.

server {
    listen 80;
    listen [::]:80;
    server_name nexapay.space www.nexapay.space;

    # Needed for judge demo uploads (CIN images) and API payloads
    client_max_body_size 25m;

    # Rust API mapped under /backend/ to avoid conflict with Next.js /api/* routes
    location ^~ /backend/ {
        proxy_pass http://127.0.0.1:8088/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Next.js app
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
